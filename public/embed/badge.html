<!--
  Selo "Criado por NorthSail" para colar em qualquer site externo.
  Estilos inline para não depender do CSS do site anfitrião.
-->
<a
  href="https://north-sail.com"
  target="_blank"
  rel="noopener"
  aria-label="Criado por NorthSail — north-sail.com"
  style="display:inline-flex;align-items:center;gap:8px;padding:8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1;color:#7A8699;text-decoration:none;transition:color .15s ease-in-out;"
  onmouseover="this.style.color='#0A2540'"
  onmouseout="this.style.color='#7A8699'"
>
  <img
    src="https://north-sail.com/logo.png"
    alt=""
    width="18"
    height="18"
    style="display:block;height:18px;width:auto;border:0;"
  />
  <span>Criado por NorthSail</span>
</a>
